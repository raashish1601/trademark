<!doctype html>
<html lang="en">
  <!--
    Static fixture replicating the STRUCTURE of the Groww web order pad
    (groww.in) for extension e2e tests — real Groww sits behind a login, so the
    capture adapter is exercised against this stand-in instead.

    Public DOM research (see docs/EXTENSION_ROADMAP.md ADR v2) established that
    Groww's web trading terminal ("915") is a React app with UTILITY / HASHED
    class names that change every deploy — so this fixture deliberately uses
    hashed-looking class names and the adapter must NOT rely on them literally.
    What it relies on (and what this fixture provides):
      - the order pad mounts DYNAMICALLY (B/S quick buttons on a watchlist row),
        so the content script's MutationObserver path is what's tested;
      - visible field LABELS "Qty" / "Price" walked to the adjacent <input>;
      - a buy/sell class FRAGMENT on the pad + the "Buy …/Place sell order"
        button copy + active side-tab text for the side;
      - `[class*='contractName']` / `[class*='ltp']` substring matchers as a
        last resort;
      - Groww F&O contracts as SPACED names ("NIFTY 25 JUN 2026 24500 CALL")
        which parseContractName understands directly.

    Visuals are approximate on purpose; structure is what the adapter reads.
  -->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Groww fixture — order pad</title>
    <style>
      body {
        margin: 0;
        font:
          14px/1.4 system-ui,
          sans-serif;
        background: #ffffff;
        color: #44475b;
      }
      ._watchlist_7a3c1 {
        width: 460px;
        border-right: 1px solid #e9e9eb;
        min-height: 100vh;
      }
      ._row_7a3c1 {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid #f1f1f3;
      }
      ._contractName_7a3c1 {
        font-weight: 600;
      }
      ._exchange_7a3c1 {
        font-size: 10px;
        color: #7c7e8c;
      }
      ._ltp_7a3c1 {
        margin-left: auto;
      }
      ._quick_7a3c1 button {
        font: inherit;
        font-size: 12px;
        width: 30px;
        height: 26px;
        border: 1px solid #e2e2e6;
        border-radius: 4px;
        background: #f7f7f8;
        color: #44475b;
        cursor: pointer;
      }
      ._buy_7a3c1 {
        color: #00b386;
      }
      ._sell_7a3c1 {
        color: #eb5b3c;
      }
      ._orderPad_5d2e9 {
        position: fixed;
        right: 24px;
        top: 80px;
        width: 380px;
        background: #ffffff;
        border: 1px solid #e2e2e6;
        border-radius: 10px;
        box-shadow: 0 10px 32px rgb(0 0 0 / 0.18);
      }
      ._padHeader_5d2e9 {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid #eef0f2;
      }
      ._contractName_5d2e9 {
        font-weight: 600;
      }
      ._exchange_5d2e9 {
        font-size: 11px;
        color: #7c7e8c;
        margin-left: 4px;
      }
      ._ltp_5d2e9 {
        margin-left: auto;
        font-size: 12px;
        color: #5a5c6b;
      }
      ._sideTabs_5d2e9 {
        display: flex;
        padding: 12px 16px 0;
        gap: 8px;
      }
      ._sideTab_5d2e9 {
        flex: 1;
        text-align: center;
        padding: 7px 0;
        border-radius: 6px 6px 0 0;
        font-size: 12px;
        background: #f3f4f6;
        cursor: pointer;
      }
      ._sideTab_5d2e9._activeTab_5d2e9 {
        font-weight: 600;
      }
      ._orderPad_5d2e9._buy_5d2e9 ._sideTab_5d2e9._activeTab_5d2e9 {
        background: #e6f7f1;
        color: #00b386;
      }
      ._orderPad_5d2e9._sell_5d2e9 ._sideTab_5d2e9._activeTab_5d2e9 {
        background: #fcebe7;
        color: #eb5b3c;
      }
      ._padBody_5d2e9 {
        display: flex;
        gap: 12px;
        padding: 16px;
      }
      ._field_5d2e9 {
        flex: 1;
      }
      ._field_5d2e9 label {
        display: block;
        font-size: 11px;
        color: #7c7e8c;
        margin-bottom: 4px;
      }
      ._field_5d2e9 input {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
        padding: 7px 9px;
        background: #fbfbfc;
        border: 1px solid #e2e2e6;
        border-radius: 4px;
        color: #44475b;
      }
      ._field_5d2e9 input:disabled {
        opacity: 0.5;
      }
      ._padFooter_5d2e9 {
        display: flex;
        align-items: center;
        padding: 14px 16px;
        border-top: 1px solid #eef0f2;
      }
      ._margin_5d2e9 {
        font-size: 12px;
        color: #7c7e8c;
      }
      ._padFooter_5d2e9 ._placeOrder_5d2e9 {
        margin-left: auto;
        font: inherit;
        padding: 9px 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
      }
      ._orderPad_5d2e9._buy_5d2e9 ._placeOrder_5d2e9 {
        background: #00b386;
      }
      ._orderPad_5d2e9._sell_5d2e9 ._placeOrder_5d2e9 {
        background: #eb5b3c;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="_watchlist_7a3c1" id="watchlistTestId">
        <div class="_row_7a3c1" data-fixture-row="RELIANCE">
          <span class="_contractName_7a3c1">RELIANCE</span>
          <span class="_exchange_7a3c1">NSE</span>
          <span class="_ltp_7a3c1">2,979.95</span>
          <span class="_quick_7a3c1">
            <button type="button" class="_buy_7a3c1" data-fixture="buy" aria-label="Buy RELIANCE">
              B
            </button>
            <button
              type="button"
              class="_sell_7a3c1"
              data-fixture="sell"
              aria-label="Sell RELIANCE"
            >
              S
            </button>
          </span>
        </div>
        <div class="_row_7a3c1" data-fixture-row="NIFTY 25 JUN 2026 24500 CALL">
          <span class="_contractName_7a3c1">NIFTY 25 JUN 2026 24500 CALL</span>
          <span class="_exchange_7a3c1">NFO</span>
          <span class="_ltp_7a3c1">145.30</span>
          <span class="_quick_7a3c1">
            <button type="button" class="_buy_7a3c1" data-fixture="buy" aria-label="Buy NIFTY">
              B
            </button>
            <button type="button" class="_sell_7a3c1" data-fixture="sell" aria-label="Sell NIFTY">
              S
            </button>
          </span>
        </div>
      </div>
    </div>

    <script>
      // Groww mounts its order pad on demand — the fixture does the same so the
      // content script's MutationObserver path is what's exercised.
      function openOrderPad(row, side) {
        document.querySelector("._orderPad_5d2e9")?.remove();
        const symbol = row.querySelector("._contractName_7a3c1").textContent.trim();
        const exchange = row.querySelector("._exchange_7a3c1").textContent.trim();
        const ltp = row.querySelector("._ltp_7a3c1").textContent.trim();
        // The NIFTY option row mimics a MARKET order: price input disabled at 0,
        // exercising the adapter's last-price fallback. RELIANCE is a limit order.
        const market = exchange === "NFO";

        const pad = document.createElement("form");
        pad.className = "_orderPad_5d2e9 _" + side + "_5d2e9";
        pad.innerHTML = `
          <div class="_padHeader_5d2e9">
            <span>
              <span class="_contractName_5d2e9">${symbol}</span>
              <span class="_exchange_5d2e9">${exchange}</span>
            </span>
            <span class="_ltp_5d2e9">LTP ₹${ltp}</span>
          </div>
          <div class="_sideTabs_5d2e9">
            <div class="_sideTab_5d2e9 ${side === "buy" ? "_activeTab_5d2e9" : ""}">Buy</div>
            <div class="_sideTab_5d2e9 ${side === "sell" ? "_activeTab_5d2e9" : ""}">Sell</div>
          </div>
          <div class="_padBody_5d2e9">
            <div class="_field_5d2e9">
              <label>Qty</label>
              <input type="number" inputmode="numeric" value="1" />
            </div>
            <div class="_field_5d2e9">
              <label>Price</label>
              <input type="number" inputmode="decimal" step="0.05"
                value="${market ? "0" : ltp.replace(/,/g, "")}" ${market ? "disabled" : ""} />
            </div>
            <div class="_field_5d2e9">
              <label>Trigger price</label>
              <input type="number" value="0" disabled />
            </div>
          </div>
          <div class="_padFooter_5d2e9">
            <span class="_margin_5d2e9">Margin ₹1,407.95</span>
            <button type="submit" class="_placeOrder_5d2e9">
              ${side === "buy" ? "Buy" : "Place sell order"}
            </button>
          </div>`;
        pad.addEventListener("submit", (e) => e.preventDefault());
        document.getElementById("root").appendChild(pad);
      }

      document.querySelectorAll("[data-fixture]").forEach((btn) => {
        btn.addEventListener("click", () =>
          openOrderPad(btn.closest("[data-fixture-row]"), btn.dataset.fixture)
        );
      });
    </script>
  </body>
</html>
