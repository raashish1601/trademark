<!doctype html>
<html lang="en">
  <!--
    Negative fixture: the Groww order pad after a hypothetical redesign that
    removed every hook the adapter relies on — no buy/sell class fragment, no
    "Buy"/"Sell" tab or "Place buy/sell order" copy (the button just says
    "Continue"), and the Qty/Price inputs no longer carry any qty/price label,
    name, id, placeholder or aria-label the adapter can anchor on.

    With no trustworthy SIDE and no qty-labelled input, the capture content
    script must inject NOTHING here and log NOTHING — "degrade silently, never
    guess" is part of the adapter contract (ADR v2).
  -->
  <head>
    <meta charset="utf-8" />
    <title>Groww fixture — changed DOM</title>
    <style>
      body {
        margin: 0;
        font:
          14px/1.4 system-ui,
          sans-serif;
        background: #ffffff;
        color: #44475b;
      }
      ._pad2_44bb2 {
        position: fixed;
        right: 24px;
        top: 80px;
        width: 380px;
        background: #ffffff;
        border: 1px solid #e2e2e6;
        border-radius: 10px;
        padding: 18px;
      }
      ._pad2_44bb2 input {
        font: inherit;
        padding: 7px 9px;
        background: #fbfbfc;
        border: 1px solid #e2e2e6;
        border-radius: 4px;
        color: #44475b;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <button type="button" data-fixture="open-changed">Open redesigned order pad</button>
    </div>
    <script>
      document.querySelector("[data-fixture='open-changed']").addEventListener("click", () => {
        const pad = document.createElement("div");
        // Shares the "orderPad" fragment so findOrderPanel still considers it —
        // but with no qty-labelled input and no side marker, the reader must
        // bail (readOrder → null), so no button is injected.
        pad.className = "_orderPad_v2_44bb2 _pad2_44bb2";
        pad.innerHTML = `
          <div class="_head_44bb2"><b>RELIANCE</b> <small>NSE</small> <span>2,979.95</span></div>
          <div class="_fields_44bb2">
            <input type="number" value="1" />
            <input type="number" value="2979.95" />
          </div>
          <div class="_foot_44bb2"><button type="button">Continue</button></div>`;
        document.getElementById("root").appendChild(pad);
      });
    </script>
  </body>
</html>
