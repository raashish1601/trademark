<!doctype html>
<html lang="en">
  <!--
    Static fixture replicating the STRUCTURE of the Dhan web order window
    (web.dhan.co / tv.dhan.co / options.dhan.co) for extension e2e tests — real
    Dhan sits behind a login, so the capture adapter is exercised against this
    stand-in instead.

    Public DOM research (see docs/EXTENSION_ROADMAP.md ADR v2) established that
    Dhan's web trading suite is a React app with UTILITY / HASHED class names
    that change every deploy — so this fixture deliberately uses hashed-looking
    class names and the adapter must NOT rely on them literally. What it relies
    on (and what this fixture provides):
      - the order window mounts DYNAMICALLY (B/S quick buttons on a watchlist
        row), so the content script's MutationObserver path is what's tested;
      - visible field LABELS "Qty" / "Price" walked to the adjacent <input>;
      - a buy/sell class FRAGMENT on the window + the "Buy …/Place sell order"
        button copy + active side-tab text for the side;
      - `[class*='tradingSymbol']` / `[class*='ltp']` substring matchers as a
        last resort;
      - Dhan F&O contracts as COMPACT tradingsymbols ("NIFTY24AUG24000CE")
        which parseContractName understands directly (Dhan is derivatives-heavy).

    Visuals are approximate on purpose; structure is what the adapter reads.
  -->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dhan fixture — order window</title>
    <style>
      body {
        margin: 0;
        font:
          14px/1.4 system-ui,
          sans-serif;
        background: #0b1020;
        color: #c7cbe0;
      }
      ._watchlist_8c4d2 {
        width: 460px;
        border-right: 1px solid #1c2238;
        min-height: 100vh;
      }
      ._row_8c4d2 {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid #161b2e;
      }
      ._tradingSymbol_8c4d2 {
        font-weight: 600;
      }
      ._exchange_8c4d2 {
        font-size: 10px;
        color: #7a80a0;
      }
      ._ltp_8c4d2 {
        margin-left: auto;
      }
      ._quick_8c4d2 button {
        font: inherit;
        font-size: 12px;
        width: 30px;
        height: 26px;
        border: 1px solid #2a3052;
        border-radius: 4px;
        background: #131830;
        color: #c7cbe0;
        cursor: pointer;
      }
      ._buy_8c4d2 {
        color: #2fbf8f;
      }
      ._sell_8c4d2 {
        color: #f4604a;
      }
      ._orderWindow_6e3f1 {
        position: fixed;
        right: 24px;
        top: 80px;
        width: 380px;
        background: #0f1428;
        border: 1px solid #2a3052;
        border-radius: 10px;
        box-shadow: 0 10px 32px rgb(0 0 0 / 0.45);
      }
      ._owHeader_6e3f1 {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid #1c2238;
      }
      ._tradingSymbol_6e3f1 {
        font-weight: 600;
      }
      ._exchange_6e3f1 {
        font-size: 11px;
        color: #7a80a0;
        margin-left: 4px;
      }
      ._ltp_6e3f1 {
        margin-left: auto;
        font-size: 12px;
        color: #9aa0c4;
      }
      ._sideTabs_6e3f1 {
        display: flex;
        padding: 12px 16px 0;
        gap: 8px;
      }
      ._sideTab_6e3f1 {
        flex: 1;
        text-align: center;
        padding: 7px 0;
        border-radius: 6px 6px 0 0;
        font-size: 12px;
        background: #131830;
        cursor: pointer;
      }
      ._sideTab_6e3f1._activeTab_6e3f1 {
        font-weight: 600;
      }
      ._orderWindow_6e3f1._buy_6e3f1 ._sideTab_6e3f1._activeTab_6e3f1 {
        background: #103a2c;
        color: #2fbf8f;
      }
      ._orderWindow_6e3f1._sell_6e3f1 ._sideTab_6e3f1._activeTab_6e3f1 {
        background: #3a1714;
        color: #f4604a;
      }
      ._owBody_6e3f1 {
        display: flex;
        gap: 12px;
        padding: 16px;
      }
      ._field_6e3f1 {
        flex: 1;
      }
      ._field_6e3f1 label {
        display: block;
        font-size: 11px;
        color: #7a80a0;
        margin-bottom: 4px;
      }
      ._field_6e3f1 input {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
        padding: 7px 9px;
        background: #0b1020;
        border: 1px solid #2a3052;
        border-radius: 4px;
        color: #c7cbe0;
      }
      ._field_6e3f1 input:disabled {
        opacity: 0.5;
      }
      ._owFooter_6e3f1 {
        display: flex;
        align-items: center;
        padding: 14px 16px;
        border-top: 1px solid #1c2238;
      }
      ._margin_6e3f1 {
        font-size: 12px;
        color: #7a80a0;
      }
      ._owFooter_6e3f1 ._placeOrder_6e3f1 {
        margin-left: auto;
        font: inherit;
        padding: 9px 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
      }
      ._orderWindow_6e3f1._buy_6e3f1 ._placeOrder_6e3f1 {
        background: #2fbf8f;
      }
      ._orderWindow_6e3f1._sell_6e3f1 ._placeOrder_6e3f1 {
        background: #f4604a;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="_watchlist_8c4d2" id="watchlistTestId">
        <div class="_row_8c4d2" data-fixture-row="RELIANCE">
          <span class="_tradingSymbol_8c4d2">RELIANCE</span>
          <span class="_exchange_8c4d2">NSE</span>
          <span class="_ltp_8c4d2">2,979.95</span>
          <span class="_quick_8c4d2">
            <button type="button" class="_buy_8c4d2" data-fixture="buy" aria-label="Buy RELIANCE">
              B
            </button>
            <button
              type="button"
              class="_sell_8c4d2"
              data-fixture="sell"
              aria-label="Sell RELIANCE"
            >
              S
            </button>
          </span>
        </div>
        <div class="_row_8c4d2" data-fixture-row="NIFTY24AUG24000CE">
          <span class="_tradingSymbol_8c4d2">NIFTY24AUG24000CE</span>
          <span class="_exchange_8c4d2">NFO</span>
          <span class="_ltp_8c4d2">182.50</span>
          <span class="_quick_8c4d2">
            <button type="button" class="_buy_8c4d2" data-fixture="buy" aria-label="Buy NIFTY">
              B
            </button>
            <button type="button" class="_sell_8c4d2" data-fixture="sell" aria-label="Sell NIFTY">
              S
            </button>
          </span>
        </div>
      </div>
    </div>

    <script>
      // Dhan mounts its sticky order window on demand — the fixture does the
      // same so the content script's MutationObserver path is what's exercised.
      function openOrderWindow(row, side) {
        document.querySelector("._orderWindow_6e3f1")?.remove();
        const symbol = row.querySelector("._tradingSymbol_8c4d2").textContent.trim();
        const exchange = row.querySelector("._exchange_8c4d2").textContent.trim();
        const ltp = row.querySelector("._ltp_8c4d2").textContent.trim();
        // The NIFTY option row mimics a MARKET order: price input disabled at 0,
        // exercising the adapter's last-price fallback. RELIANCE is a limit order.
        const market = exchange === "NFO";

        const win = document.createElement("form");
        win.className = "_orderWindow_6e3f1 _" + side + "_6e3f1";
        win.innerHTML = `
          <div class="_owHeader_6e3f1">
            <span>
              <span class="_tradingSymbol_6e3f1">${symbol}</span>
              <span class="_exchange_6e3f1">${exchange}</span>
            </span>
            <span class="_ltp_6e3f1">LTP ₹${ltp}</span>
          </div>
          <div class="_sideTabs_6e3f1">
            <div class="_sideTab_6e3f1 ${side === "buy" ? "_activeTab_6e3f1" : ""}">Buy</div>
            <div class="_sideTab_6e3f1 ${side === "sell" ? "_activeTab_6e3f1" : ""}">Sell</div>
          </div>
          <div class="_owBody_6e3f1">
            <div class="_field_6e3f1">
              <label>Qty</label>
              <input type="number" inputmode="numeric" value="1" />
            </div>
            <div class="_field_6e3f1">
              <label>Price</label>
              <input type="number" inputmode="decimal" step="0.05"
                value="${market ? "0" : ltp.replace(/,/g, "")}" ${market ? "disabled" : ""} />
            </div>
            <div class="_field_6e3f1">
              <label>Trigger price</label>
              <input type="number" value="0" disabled />
            </div>
          </div>
          <div class="_owFooter_6e3f1">
            <span class="_margin_6e3f1">Margin ₹1,407.95</span>
            <button type="submit" class="_placeOrder_6e3f1">
              ${side === "buy" ? "Buy" : "Place sell order"}
            </button>
          </div>`;
        win.addEventListener("submit", (e) => e.preventDefault());
        document.getElementById("root").appendChild(win);
      }

      document.querySelectorAll("[data-fixture]").forEach((btn) => {
        btn.addEventListener("click", () =>
          openOrderWindow(btn.closest("[data-fixture-row]"), btn.dataset.fixture)
        );
      });
    </script>
  </body>
</html>
